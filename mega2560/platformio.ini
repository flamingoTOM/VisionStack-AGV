[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps = 
	paulstoffregen/TimerOne@^1.1.1
	paulstoffregen/MsTimer2@^1.1
	adafruit/Adafruit GFX Library@^1.11.7
	adafruit/Adafruit SSD1306@^2.5.7
	arduino-libraries/Servo@^1.2.1
	miguelbalboa/MFRC522@^1.4.10
	z3t0/IRremote@^4.2.0
